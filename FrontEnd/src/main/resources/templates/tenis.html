<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventario de Tenis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://images.icon-icons.com/28/PNG/256/shoes_safety_2733.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="p-4 md:p-6">
<div class="max-w-6xl mx-auto">

    <div class="mb-6">
        <h1 class="text-4xl font-bold text-gray-800">
            Inventario de Tenis
        </h1>
        <p class="text-gray-600 mt-1 text-base">
            Gestión de productos
        </p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-6">

        <div class="mb-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-5">
                Registrar Tenis
            </h2>

            <form th:action="@{/tenis/guardar}"
                  th:object="${tenisDto}"
                  method="post"
                  class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!---Action: envia los datos a la url guardar--->
                <!---Object: conecta el formulario con tenisDto del View para que este trabaje en el--->

                <div>
                    <label class="block text-base font-medium mb-2">
                        Marca
                    </label>

                    <input type="text"
                           th:field="*{marca}"
                           required
                           class="w-full border border-gray-300
                                  rounded-xl p-3 text-base
                                  focus:outline-none
                                  focus:ring-2
                                  focus:ring-blue-500">
                    <!---Field: conecta el input con el atributo java--->
                </div>

                <div>
                    <label class="block text-base font-medium mb-2">
                        Modelo
                    </label>

                    <input type="text"
                           th:field="*{modelo}"
                           required
                           class="w-full border border-gray-300
                                  rounded-xl p-3 text-base
                                  focus:outline-none
                                  focus:ring-2
                                  focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-base font-medium mb-2">
                        Precio
                    </label>

                    <input type="number"
                           step="0.01"
                           th:field="*{precio}"
                           required
                           class="w-full border border-gray-300
                                  rounded-xl p-3 text-base
                                  focus:outline-none
                                  focus:ring-2
                                  focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-base font-medium mb-2">
                        Stock
                    </label>

                    <input type="number"
                           th:field="*{stock}"
                           required
                           class="w-full border border-gray-300
                                  rounded-xl p-3 text-base
                                  focus:outline-none
                                  focus:ring-2
                                  focus:ring-blue-500">
                </div>

                <div class="md:col-span-2 mt-1">
                    <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700
                                   text-white text-base font-semibold
                                   px-6 py-3 rounded-xl
                                   transition duration-200">
                        Guardar Tenis
                    </button>     <!--- Usando post envia el formulario a la URL guardar indicado en el action inicial--->
                </div>
            </form>
        </div>

        <div class="mb-6">
            <div class="bg-green-100 border border-green-300
                        rounded-xl p-4">
                <h3 class="text-lg font-semibold text-green-800">
                    Total Stock:
                    <span th:text="${stockTotal}">
                        0
                    </span>    <!---Text: Reemplaza el 0 indicado incialmente por el valor contenido en stockTotal del view--->
                </h3>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl shadow">

            <table class="w-full bg-white">
                <thead class="bg-blue-500 text-white">
                <tr>
                    <th class="p-3 text-sm">
                        ID
                    </th>

                    <th class="p-3 text-sm">
                        Marca
                    </th>

                    <th class="p-3 text-sm">
                        Modelo
                    </th>

                    <th class="p-3 text-sm">
                        Precio
                    </th>

                    <th class="p-3 text-sm">
                        Stock
                    </th>

                    <th class="p-3 text-sm">
                        Actualizar
                    </th>

                    <th class="p-3 text-sm">
                        Eliminar
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="t : ${listaTenis}" class="border-b hover:bg-gray-50">
                    <!---Each: Recorre la lista enviada desde el view con listaTenis y la muestra (Cada tenis = t una fila)--->

                    <td class="p-3 text-center text-sm"
                        th:text="${t.idTenis}">
                    </td>

                    <td class="p-3 text-center text-sm"
                        th:text="${t.marca}">
                    </td>

                    <td class="p-3 text-center text-sm"
                        th:text="${t.modelo}">
                    </td>

                    <td class="p-3 text-center text-sm"
                        th:text="${t.precio}">
                    </td>

                    <td class="p-3 text-center text-sm"
                        th:text="${t.stock}">
                    </td>

                    <td class="p-3 text-center">
                        <form th:action="@{/tenis/actualizar}" method="post" class="flex gap-2 items-center justify-center">
                            <!---Envia los datos a la URL actualizar --->

                            <input type="hidden" name="id" th:value="${t.idTenis}">

                            <input type="number"
                                   step="0.01"
                                   name="precio"
                                   th:value="${t.precio}"
                                   class="w-24 p-2 text-smborder rounded-lg">
                            <!---Value: Inserta variables del servidor en el input--->

                            <input type="number"
                                   name="stock"
                                   th:value="${t.stock}"
                                   class="w-20 p-2 text-smborder rounded-lg">

                            <button type="submit"
                                    class="bg-blue-500 hover:bg-blue-600
                                           text-white text-sm
                                           px-3 py-2 rounded-lg">
                                Actualizar
                            </button> <!--- Usando post envia el formulario a la URL actualizar indicado en el action inicial--->
                        </form>
                    </td>

                    <td class="p-3 text-center">
                        <form th:action="@{/tenis/eliminar}"
                              method="post">

                            <input type="hidden"
                                   name="id"
                                   th:value="${t.idTenis}">

                            <button type="submit"
                                    class="bg-red-500 hover:bg-red-600
                                           text-white text-sm
                                           px-3 py-2 rounded-lg">
                                Eliminar
                            </button> <!--- Usando post envia el formulario a la URL eliminar indicado en el action inicial--->
                        </form>
                    </td>
                </tr>

                </tbody>
            </table>

        </div>
    </div>
</div>

</body>
</html>
